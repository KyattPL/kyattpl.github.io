---
layout: default
---

<div class="flex-grow-1 px-xl-1">
  <h1 class="fw-bold">My Projects</h1>
  <p class="fs-5 text-muted mb-4">A selection of projects I'm proud of.</p>

  <!-- Re-introduce g-4 for correct grid spacing. This fixes the margin issue. -->
  <div id="project-list" class="row g-4">
    {% for project in site.data.projects %}
      <div class="col-md-6">
        <!-- The <a> tag is the card itself. d-flex and flex-column are key for layout. -->
        <a href="{{ project.url }}" target="_blank" rel="noopener" class="card-wrapper card h-100 d-flex flex-column">
          
          {% if project.image %}
            <!-- The image uses the standard card-img-top class, which we will style. -->
            <img src="{{ project.image | relative_url }}" alt="{{ project.name }} preview" class="card-img-top">
          {% endif %}

          <!-- The card-body now correctly contains all text content. -->
          <div class="card-body d-flex flex-column">
            <h2 class="card-title my-2 mt-md-0">{{ project.name }}</h2>
            <div class="card-text content">
              <p>{{ project.description }}</p>
            </div>

            {% if project.repo %}
              <!-- This structure correctly pushes the repo link to the bottom. -->
              <div class="post-meta flex-grow-1 d-flex align-items-end">
                <div class="me-auto">
                  <i class="fab fa-github fa-fw me-1"></i>
                  <span class="repo-name">{{ project.repo }}</span>
                </div>
              </div>
            {% endif %}
          </div>
        </a>
      </div>
    {% endfor %}
  </div>
</div>
